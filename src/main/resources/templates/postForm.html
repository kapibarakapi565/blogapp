<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<a th:href="@{/}">ブログ一覧に戻る</a>
<h1>新規投稿</h1>
<form th:action="@{/posts}" th:method="post" th:object="${postForm}">
    <input type="text" th:field="*{title}" class="form-control mb-3">
    <textarea th:field="*{content}" class="form-control mb-3" rows="8"></textarea>
    <button type="submit" class="btn btn-primary">投稿</button>
</form>

</body>
</html>
